
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; }
  body { font-family: 'Quicksand', sans-serif; }

  .page {
    position: relative;
    min-height: 100vh;
    background: linear-gradient(160deg, #FFF6FA 0%, #FBF1FB 45%, #F3E8FB 100%);
    color: #5B3A56;
    overflow-x: hidden;
    padding: 0 0 80px;
  }
  .ambient { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .petal { position: absolute; bottom: -5%; border-radius: 50% 0 50% 50%; opacity: 0.55; animation: floatUp linear infinite; }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.55; }
    90% { opacity: 0.45; }
    100% { transform: translateY(-110vh) rotate(320deg); opacity: 0; }
  }
  .content {
    position: relative; z-index: 1; max-width: 460px; margin: 0 auto;
    padding: 56px 24px 0; display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .eyebrow { font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; color: #B07AA1; font-weight: 600; margin-bottom: 6px; }
  .name-input {
  font-family: 'Caveat', cursive; font-size: clamp(30px, 9vw, 56px); font-weight: 700; color: #7A3E6E;
  text-align: center; background: transparent; border: none; outline: none; width: 100%; line-height: 1.15;
  white-space: normal; word-wrap: break-word; overflow: hidden; resize: none; display: block; padding: 0;
}
  .name-input.editing { border-bottom: 2px dashed #E3A8C9; }
  .tagline { font-size: 15px; color: #8B5E80; margin-top: 4px; margin-bottom: 36px; }

  .gift-wrap { position: relative; width: 160px; height: 150px; margin-bottom: 8px; cursor: pointer; }
  .gift-wrap.opened { cursor: default; }
  .lid {
    position: absolute; top: 0; left: -6px; width: 172px; height: 38px;
    background: linear-gradient(135deg, #F4B6D2, #E89AB3); border-radius: 8px; z-index: 3;
    transition: transform 0.6s cubic-bezier(.34,1.56,.64,1), opacity 0.5s ease;
    box-shadow: 0 4px 10px rgba(190,110,150,0.25);
  }
  .gift-wrap.opened .lid { transform: translateY(-60px) rotate(-18deg) translateX(-20px); opacity: 0; }
  .box-body {
    position: absolute; bottom: 0; left: 6px; width: 148px; height: 110px;
    background: linear-gradient(160deg, #F8C9DD, #EFA9C8); border-radius: 6px;
    box-shadow: inset 0 -8px 14px rgba(190,110,150,0.18), 0 8px 16px rgba(190,110,150,0.2);
  }
  .ribbon-v { position: absolute; left: 50%; top: 0; bottom: 0; width: 18px; margin-left: -9px; background: linear-gradient(180deg, #FBE3A8, #F3C77D); z-index: 2; }
  .ribbon-h {
    position: absolute; top: -6px; left: -6px; width: 172px; height: 16px;
    background: linear-gradient(90deg, #FBE3A8, #F3C77D); z-index: 4;
    transition: opacity 0.4s ease, transform 0.5s ease;
  }
  .gift-wrap.opened .ribbon-h { opacity: 0; transform: scaleX(0.4); }
  .bow { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-size: 30px; z-index: 5; transition: opacity 0.4s ease, transform 0.5s ease; }
  .gift-wrap.opened .bow { opacity: 0; transform: translate(-50%, -20px) scale(0.6); }
  .gift-hint { font-size: 13px; color: #B07AA1; margin-top: 14px; margin-bottom: 32px; min-height: 18px; }

  .bouquet-pop {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 6;
    animation: bouquetPop 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .bouquet-emoji { font-size: 52px; }
  .bouquet-caption {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    color: #7A3E6E;
    margin-top: 2px;
    opacity: 0;
    animation: captionFade 0.5s ease forwards 0.3s;
  }
  @keyframes bouquetPop {
    0% { transform: translateX(-50%) translateY(20px) scale(0.3); opacity: 0; }
    60% { transform: translateX(-50%) translateY(-6px) scale(1.1); opacity: 1; }
    100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
  }
  @keyframes captionFade { to { opacity: 1; } }

  .confetti-layer { position: absolute; top: -20px; left: 0; width: 100%; height: 0; overflow: visible; pointer-events: none; }
  .confetti-piece { position: absolute; top: 0; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall ease-out forwards; }
  @keyframes confettiFall {
    0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--drift), 220px) rotate(360deg); opacity: 0; }
  }

  .message-card {
    width: 100%; background:linear-gradient(135deg, #fff8d6, #ffeef7) ; border-radius: 18px; padding: 22px 22px 18px;
    box-shadow: 0 10px 30px rgba(170,110,150,0.12); border: 2px solid #FFD86B;
    transform: translateY(10px); opacity: 0; max-height: 0; overflow: hidden;
    transition: opacity 0.5s ease, transform 0.5s ease, max-height 0.5s ease, margin 0.5s ease; margin-bottom: 0;
  }
  .message-card.show { opacity: 1; transform: translateY(0); max-height: 600px; margin-bottom: 28px; }
  .message-text {
    font-size: 15.5px; line-height: 1.65; color: #6B4565; font-weight: 700;width: 100%; background: transparent;
    border: none; outline: none; resize: none; font-family: 'Quicksand', sans-serif; text-align: left;
  }
  .message-text.editing { border: 1.5px dashed #E3A8C9; border-radius: 10px; padding: 8px; }

  .photo-row { display: flex; gap: 14px; margin-bottom: 30px; justify-content: center; }
  .polaroid { width: 115px; background: #fff; padding: 8px 8px 16px; border-radius: 4px; box-shadow: 0 6px 14px rgba(170,110,150,0.18); position: relative; }
  .polaroid:nth-child(1) { transform: rotate(-6deg); }
  .polaroid:nth-child(2) { transform: rotate(3deg) translateY(6px); }
  .polaroid:nth-child(3) { transform: rotate(7deg); }
  .photo-slot {
    width: 100%; height: 115px; border-radius: 2px; background: #FBEEF4; display: flex;
    align-items: center; justify-content: center; cursor: pointer; overflow: hidden; color: #D497B8; font-size: 24px;
  }
  .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
  .remove-photo {
    position: absolute; top: 2px; right: 2px; background: rgba(255,255,255,0.9); border-radius: 50%;
    width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #B0507A; box-shadow: 0 1px 4px rgba(0,0,0,0.15); font-size: 12px;
  }

  .quote-card { width: 100%; background: linear-gradient(135deg, #F3E6FB, #FDEAF2); border-radius: 16px; padding: 20px 20px 16px; margin-bottom: 36px; position: relative; }
  .quote-icon { margin-bottom: 8px; color: #C98DB8; font-size: 18px; }
  .quote-text {
    font-family: 'Caveat', cursive; font-size: 22px; line-height: 1.3; color: #7A3E6E; width: 100%;
    background: transparent; border: none; outline: none; resize: none; text-align: center;
  }
  .quote-text.editing { border-bottom: 2px dashed #C98DB8; }

  .footer-note { font-size: 12.5px; color: #C190AE; display: flex; align-items: center; gap: 5px; justify-content: center; }

  .edit-toggle {
    position: fixed; bottom: 22px; right: 22px; width: 50px; height: 50px; border-radius: 50%;
    background: #7A3E6E; color: #fff; border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 8px 18px rgba(122,62,110,0.35); z-index: 10; font-size: 20px;
  }

  @media (prefers-reduced-motion: reduce) {
    .petal { animation: none; display: none; }
    .confetti-piece { animation: none; opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<audio id="bgMusic" loop>
  <source src="birthday-song.mp3" type="audio/mpeg">
</audio>

<script type="text/babel">
const { useState, useRef, useMemo, useEffect } = React;

const PETAL_COLORS = ["#F3B6CC", "#D9C2F0", "#FCD9A0", "#F7E1EE"];

function makeAmbientPetals(count) {
  return Array.from({ length: count }, (_, i) => ({
    id: i,
    left: (i * 37) % 100,
    size: 8 + ((i * 13) % 10),
    duration: 14 + ((i * 7) % 10),
    delay: (i * 1.7) % 12,
    color: PETAL_COLORS[i % PETAL_COLORS.length],
  }));
}

function makeConfetti(count) {
  return Array.from({ length: count }, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    rotate: Math.random() * 360,
    duration: 2.2 + Math.random() * 1.4,
    delay: Math.random() * 0.5,
    color: PETAL_COLORS[i % PETAL_COLORS.length],
    drift: (Math.random() - 0.5) * 80,
  }));
}

function BirthdayWish() {
  // ---- EDIT YOUR DEFAULTS HERE ----
  const [editMode, setEditMode] = useState(false);
  const [name, setName] = useState("Most Gorgeous Girl");
  const [message, setMessage] = useState(
    "'MANY MANY HAPPY RETURNS OF THE DAY MY BABY 💕' Wishing you the most happiest birthday of your life. Hope you remain Happy and cheerful throughout this year. I'm so glad I get to have you. Here's to a year as good as you deserve \u2014 I hope today feels exactly that special.                             -Your Admirer (Also your Boyfriend😘)"
  );
  const [quote, setQuote] = useState(
    "Some people make the ordinary days feel warmer just by being in them. You're one of them."
  );
  // ---- END EDIT AREA ----

  
  const [photos, setPhotos] = useState([
  "photo3.jpg",
  "photo1.jpg",
  "photo2.jpg"
]);
  const [giftOpened, setGiftOpened] = useState(false);
  const [confetti, setConfetti] = useState([]);
  const [showBouquet, setShowBouquet] = useState(false);
  const [wordCount, setWordCount] = useState(0);

  const fileInputRef = useRef(null);
  const activeSlot = useRef(null);
  const ambientPetals = useMemo(() => makeAmbientPetals(10), []);

  const openGift = () => {
    if (giftOpened) return;const music = document.getElementById("bgMusic");
music.play();
    setConfetti(makeConfetti(26));
    setGiftOpened(true);
    setTimeout(() => setShowBouquet(true), 500);
    setTimeout(() => setShowBouquet(false), 2300);
  };

  useEffect(() => {
    if (!giftOpened) return;
    const words = message.trim().split(/\s+/);
    const startDelay = setTimeout(() => {
      let i = 0;
      const interval = setInterval(() => {
        i++;
        setWordCount(i);
        if (i >= words.length) clearInterval(interval);
      }, 150);
    }, 2200);
    return () => clearTimeout(startDelay);
  }, [giftOpened]);

  const triggerUpload = (index) => {
    activeSlot.current = index;
    fileInputRef.current?.click();
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      setPhotos((prev) => {
        const next = [...prev];
        next[activeSlot.current] = reader.result;
        return next;
      });
    };
    reader.readAsDataURL(file);
    e.target.value = "";
  };

  const removePhoto = (index) => {
    setPhotos((prev) => {
      const next = [...prev];
      next[index] = null;
      return next;
    });
  };

  return (
    <div className="page">
      <div className="ambient">
        {ambientPetals.map((p) => (
          <span
            key={p.id}
            className="petal"
            style={{
              left: `${p.left}%`,
              width: p.size,
              height: p.size,
              background: p.color,
              animationDuration: `${p.duration}s`,
              animationDelay: `${p.delay}s`,
            }}
          />
        ))}
      </div>

      <input
        ref={fileInputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={handleFileChange}
      />

      <div className="content">
        <div className="eyebrow">a little something for</div>

        <input
          className={`name-input ${editMode ? "editing" : ""}`}
          value={name}
          onChange={(e) => setName(e.target.value)}
          readOnly={!editMode}
        />
        <div className="tagline"> Birthday Wishes</div>

        <div className={`gift-wrap ${giftOpened ? "opened" : ""}`} onClick={openGift}>
          {showBouquet && (
            <div className="bouquet-pop">
              <div className="bouquet-emoji">💐</div>
              <div className="bouquet-caption">this is for you</div>
            </div>
          )}
          <div className="confetti-layer">
            {confetti.map((c) => (
              <span
                key={c.id}
                className="confetti-piece"
                style={{
                  left: `${c.left}%`,
                  background: c.color,
                  animationDuration: `${c.duration}s`,
                  animationDelay: `${c.delay}s`,
                  "--drift": `${c.drift}px`,
                  transform: `rotate(${c.rotate}deg)`,
                }}
              />
            ))}
          </div>
          <div className="bow">🎀</div>
          <div className="ribbon-h" />
          <div className="lid" />
          <div className="box-body">
            <div className="ribbon-v" />
          </div>
        </div>
        <div className="gift-hint">{giftOpened ? "" : "tap the gift to open it"}</div>

        <div className={`message-card ${giftOpened ? "show" : ""}`}>
          {editMode ? (
            <textarea
              className="message-text editing"
              value={message}
              onChange={(e) => setMessage(e.target.value)}
              rows={5}
            />
          ) : (
            <p className="message-text">
              {message.trim().split(/\s+/).slice(0, wordCount).join(" ")}
            </p>
          )}
        </div>

        <div className="photo-row">
          {photos.map((src, i) => (
            <div className="polaroid" key={i}>
              <div className="photo-slot" onClick={() => triggerUpload(i)}>
                {src ? <img src={src} alt="" /> : "📷"}
              </div>
              {src && editMode && (
                <div
                  className="remove-photo"
                  onClick={(e) => {
                    e.stopPropagation();
                    removePhoto(i);
                  }}
                >
                  ✕
                </div>
              )}
            </div>
          ))}
        </div>

        <div className="quote-card">
          <div className="quote-icon">🎂</div>
          <textarea
            className={`quote-text ${editMode ? "editing" : ""}`}
            value={quote}
            onChange={(e) => setQuote(e.target.value)}
            readOnly={!editMode}
            rows={2}
          />
        </div>

        <div className="footer-note">made with ❤️ for My Favourite</div>
      </div>

      <button
        className="edit-toggle"
        onClick={() => setEditMode((v) => !v)}
        title={editMode ? "Done editing" : "Edit this page"}
      >
        {editMode ? "✓" : "✏️"}
      </button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BirthdayWish />);
</script>
</body>
</html>
